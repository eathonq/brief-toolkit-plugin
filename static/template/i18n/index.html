<div id="app" class="i18n-panel">
    <div class="row row-setting">
        <h3 class="section-title">多语言资源目录设置：</h3>
        <input id="resourceDirInput" class="input" type="text" placeholder="请配置多语言目录" />
        <button id="confirmResourceDirBtn" class="btn" type="button">添加</button>
    </div>

    <div class="row row-title">
        <h3 class="section-title">多语言列表：</h3>
    </div>

    <div class="row row-table">
        <table class="dir-table">
            <thead>
                <tr>
                    <th>目录</th>
                    <th>是否模板</th>
                    <th>设置模板</th>
                    <th>同步</th>
                    <th>打开</th>
                    <th>删除</th>
                </tr>
            </thead>
            <tbody id="dirTableBody"></tbody>
        </table>
    </div>

    <div class="row row-add">
        <input id="newDirInput" class="input" type="text" placeholder="请输入目录名称，例如 zh" />
        <button id="addDirBtn" class="btn" type="button">新增</button>
    </div>
</div>
