<div class="i18n-panel">
    <div class="row row-setting">
        <h3 class="section-title">引导资源目录设置：</h3>
        <input id="resourceDirInput" class="input" type="text" placeholder="请配置引导资源目录" />
        <button id="confirmResourceDirBtn" class="btn" type="button">添加</button>
    </div>

    <div class="row row-title">
        <h3 class="section-title">引导资源列表：</h3>
    </div>

    <div class="row row-table">
        <table class="dir-table">
            <thead>
                <tr>
                    <th>目录</th>
                    <th>打开</th>
                    <th>删除</th>
                </tr>
            </thead>
            <tbody id="guideTableBody"></tbody>
        </table>
    </div>

    <div class="row row-add">
        <input id="newGuideInput" class="input" type="text" placeholder="请输入引导名称" />
        <button id="addGuideBtn" class="btn" type="button">新增</button>
    </div>
</div>
